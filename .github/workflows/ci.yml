name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Range, not exact: hosted images ship 26.4.1+/26.5, never 26.0.
          # An exact "26.0" pin is what kept CI red from 2026-04-28 to 06-10.
          xcode-version: "^26.0"

      - name: Tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint@0.63.2 xcodegen@2.42.0 || \
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint xcodegen

      - name: SwiftPM build
        run: swift build

      - name: SwiftLint
        run: swiftlint lint --quiet

      - name: SwiftPM tests with coverage
        run: swift test

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Xcode tests (unit + system, no signing)
        run: |
          xcodebuild test \
            -project Caloura.xcodeproj \
            -scheme Caloura \
            -configuration Debug \
            -derivedDataPath .build/DerivedData-ci \
            -destination 'platform=macOS' \
            -skip-testing:CalouraUITests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
