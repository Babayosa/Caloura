name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint@0.63.2 xcodegen@2.42.0 || \
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint xcodegen

      - name: SwiftPM build
        run: swift build

      - name: SwiftLint
        run: swiftlint

      - name: SwiftPM tests with coverage
        run: |
          swift test --enable-code-coverage
          xcrun llvm-cov report \
            .build/debug/CalouraPackageTests.xctest/Contents/MacOS/CalouraPackageTests \
            -instr-profile .build/debug/codecov/default.profdata \
            -ignore-filename-regex '.build|Tests' || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Xcode tests (no signing)
        run: |
          xcodebuild test \
            -project Caloura.xcodeproj \
            -scheme Caloura \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
