name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 2.2.2)"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release-smoke:
    runs-on: macos-26
    env:
      NOTARY_PROFILE: Caloura-Notarize
      SIGNING_KEYCHAIN: ${{ runner.temp }}/caloura-signing.keychain-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast (<30s) on missing secrets before any expensive setup. A
      # tag push that lacks signing credentials should not waste 8+ minutes
      # of Xcode pinning, brew installs, and a full release build.
      - name: Validate release secrets
        env:
          CALOURA_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.CALOURA_DEVELOPER_ID_CERT_P12_BASE64 }}
          CALOURA_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.CALOURA_DEVELOPER_ID_CERT_PASSWORD }}
          CALOURA_SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.CALOURA_SIGNING_KEYCHAIN_PASSWORD }}
          CALOURA_NOTARY_APPLE_ID: ${{ secrets.CALOURA_NOTARY_APPLE_ID }}
          CALOURA_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.CALOURA_NOTARY_APP_SPECIFIC_PASSWORD }}
          CALOURA_NOTARY_TEAM_ID: ${{ secrets.CALOURA_NOTARY_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            CALOURA_DEVELOPER_ID_CERT_P12_BASE64
            CALOURA_DEVELOPER_ID_CERT_PASSWORD
            CALOURA_SIGNING_KEYCHAIN_PASSWORD
            CALOURA_NOTARY_APPLE_ID
            CALOURA_NOTARY_APP_SPECIFIC_PASSWORD
            CALOURA_NOTARY_TEAM_ID
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required secret: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "^26.0"

      - name: Tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Import Developer ID certificate
        env:
          CALOURA_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.CALOURA_DEVELOPER_ID_CERT_P12_BASE64 }}
          CALOURA_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.CALOURA_DEVELOPER_ID_CERT_PASSWORD }}
          CALOURA_SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.CALOURA_SIGNING_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/caloura-developer-id.p12"
          echo "$CALOURA_DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$CALOURA_SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN"
          security unlock-keychain -p "$CALOURA_SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security import "$CERT_PATH" \
            -k "$SIGNING_KEYCHAIN" \
            -P "$CALOURA_DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$CALOURA_SIGNING_KEYCHAIN_PASSWORD" \
            "$SIGNING_KEYCHAIN"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN"
          security default-keychain -d user -s "$SIGNING_KEYCHAIN"

      - name: Configure notarytool profile
        env:
          CALOURA_SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.CALOURA_SIGNING_KEYCHAIN_PASSWORD }}
          CALOURA_NOTARY_APPLE_ID: ${{ secrets.CALOURA_NOTARY_APPLE_ID }}
          CALOURA_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.CALOURA_NOTARY_APP_SPECIFIC_PASSWORD }}
          CALOURA_NOTARY_TEAM_ID: ${{ secrets.CALOURA_NOTARY_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          security unlock-keychain -p "$CALOURA_SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$CALOURA_NOTARY_APPLE_ID" \
            --password "$CALOURA_NOTARY_APP_SPECIFIC_PASSWORD" \
            --team-id "$CALOURA_NOTARY_TEAM_ID" \
            --keychain "$SIGNING_KEYCHAIN"

      - name: Install tools
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint@0.63.2 xcodegen@2.42.0 || \
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint xcodegen

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build, sign, and notarize the release
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/release.sh
          RELEASE_TAG="v${{ steps.version.outputs.value }}" ./scripts/release.sh "${{ steps.version.outputs.value }}"

      - name: Smoke packaged artifacts
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.value }}"
          APP_PATH="build/export/Caloura.app"
          DMG_PATH="build/Caloura-${VERSION}.dmg"
          INSTALL_ROOT="$RUNNER_TEMP/caloura-install"
          INSTALL_PATH="$INSTALL_ROOT/Caloura.app"
          MOUNT_PATH="$RUNNER_TEMP/caloura-dmg"

          rm -rf "$INSTALL_ROOT" "$MOUNT_PATH"
          mkdir -p "$INSTALL_ROOT" "$MOUNT_PATH"
          trap 'hdiutil detach "$MOUNT_PATH" >/dev/null 2>&1 || true' EXIT

          codesign --verify --deep --strict "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"

          hdiutil attach -readonly -nobrowse -mountpoint "$MOUNT_PATH" "$DMG_PATH" >/dev/null
          ditto "$MOUNT_PATH/Caloura.app" "$INSTALL_PATH"
          QUARANTINE_STAMP=$(printf '%x' "$(date +%s)")
          QUARANTINE_VALUE="0081;${QUARANTINE_STAMP};ReleaseSmoke;$(uuidgen)"
          xattr -w com.apple.quarantine "$QUARANTINE_VALUE" "$INSTALL_PATH"
          xattr -p com.apple.quarantine "$INSTALL_PATH" >/dev/null
          spctl -a -vv "$INSTALL_PATH"

          open -a "$INSTALL_PATH"
          sleep 5
          if ! pgrep -x Caloura >/dev/null; then
            echo "ERROR: Caloura did not remain running after quarantined launch"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INSTALL_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INSTALL_PATH/Contents/Info.plist"
          codesign --verify --deep --strict "$INSTALL_PATH"

      - name: Cleanup signing keychain
        if: always()
        env:
          CALOURA_SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.CALOURA_SIGNING_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          security delete-keychain "$SIGNING_KEYCHAIN" 2>/dev/null || true
