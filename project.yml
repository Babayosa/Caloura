name: SnapNote
options:
  bundleIdPrefix: com.snapnote
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SnapNote:
    type: application
    platform: macOS
    sources:
      - path: SnapNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapnote.app
        INFOPLIST_FILE: SnapNote/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_ENTITLEMENTS: SnapNote/Resources/SnapNote.entitlements
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: SnapNote/Resources/Info.plist
      properties:
        CFBundleName: SnapNote
        CFBundleDisplayName: SnapNote
        CFBundleIdentifier: com.snapnote.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: SnapNote
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSScreenCaptureUsageDescription: "SnapNote needs screen recording access to capture screenshots."

  SnapNoteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SnapNoteTests
    dependencies:
      - target: SnapNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapnote.app.tests
        GENERATE_INFOPLIST_FILE: true
