name: Caloura
options:
  bundleIdPrefix: com.caloura
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.8.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "2.1.5"
    CURRENT_PROJECT_VERSION: "15"
    CALOURA_RELEASE_CHANNEL: stable
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Caloura:
    type: application
    platform: macOS
    sources:
      - path: Caloura
    preBuildScripts:
      - path: scripts/validate_release_build_settings.sh
        name: Validate Release Build Settings
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app
        INFOPLIST_FILE: Caloura/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_ENTITLEMENTS: Caloura/Resources/Caloura.entitlements
        ENABLE_HARDENED_RUNTIME: true
        DEVELOPMENT_TEAM: NG4ML6Q47T
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app.debug
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          CALOURA_REQUIRE_SIGNED_ENTITLEMENT: NO
          CALOURA_LICENSE_ENTITLEMENT_URL: ""
          CALOURA_LICENSE_ENTITLEMENT_PUBLIC_KEY: ""
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
          CALOURA_REQUIRE_SIGNED_ENTITLEMENT: YES
          CALOURA_LICENSE_ENTITLEMENT_URL: "https://caloura-license.bigdaddy1858.workers.dev"
          CALOURA_LICENSE_ENTITLEMENT_PUBLIC_KEY: "zHrtbRn7DB2hCslB0M6MoA6ZDm234OrgY6LPehROwO0="
    dependencies:
      - sdk: AppIntents.framework
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: Caloura/Resources/Info.plist
      properties:
        CFBundleName: Caloura
        CFBundleDisplayName: Caloura
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: APPL
        CFBundleExecutable: Caloura
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "26.0"
        LSUIElement: true
        NSScreenCaptureUsageDescription: "Caloura needs screen recording access to capture screenshots."
        NSAccessibilityUsageDescription: "Caloura needs Accessibility access to simulate scrolling for Scroll Capture."
        CalouraReleaseChannel: "$(CALOURA_RELEASE_CHANNEL)"
        CalouraRequireSignedEntitlement: "$(CALOURA_REQUIRE_SIGNED_ENTITLEMENT)"
        CalouraLicenseEntitlementURL: "$(CALOURA_LICENSE_ENTITLEMENT_URL)"
        CalouraLicenseEntitlementPublicKey: "$(CALOURA_LICENSE_ENTITLEMENT_PUBLIC_KEY)"
        SUPublicEDKey: "jvH62SR8OsHYcY9lPGDneNLbOWijs5GGempwmXnEUL8="
        NSHumanReadableCopyright: "Copyright © 2025 Caloura. All rights reserved."
        SUFeedURL: "https://caloura.app/appcast.xml"

  CalouraTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CalouraTests
    dependencies:
      - sdk: AppIntents.framework
      - target: Caloura
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app.tests
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: NG4ML6Q47T
        CODE_SIGN_STYLE: Automatic

  CalouraSystemTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CalouraSystemTests
      - path: CalouraTests/Helpers
    dependencies:
      - sdk: AppIntents.framework
      - target: Caloura
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app.systemtests
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: NG4ML6Q47T
        CODE_SIGN_STYLE: Automatic

  CalouraUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CalouraUITests
    dependencies:
      - sdk: AppIntents.framework
      - target: Caloura
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app.uitests
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: NG4ML6Q47T
        CODE_SIGN_STYLE: Automatic

schemes:
  Caloura:
    build:
      targets:
        Caloura: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: CalouraTests
        - name: CalouraSystemTests
        - name: CalouraUITests
    archive:
      config: Release
