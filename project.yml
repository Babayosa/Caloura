name: Caloura
options:
  bundleIdPrefix: com.caloura
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Caloura:
    type: application
    platform: macOS
    sources:
      - path: Caloura
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app
        INFOPLIST_FILE: Caloura/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_ENTITLEMENTS: Caloura/Resources/Caloura.entitlements
        ENABLE_HARDENED_RUNTIME: true
        DEVELOPMENT_TEAM: NG4ML6Q47T
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: Caloura/Resources/Info.plist
      properties:
        CFBundleName: Caloura
        CFBundleDisplayName: Caloura
        CFBundleIdentifier: com.caloura.app
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.0.2"
        CFBundlePackageType: APPL
        CFBundleExecutable: Caloura
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSScreenCaptureUsageDescription: "Caloura needs screen recording access to capture screenshots."
        SUPublicEDKey: "jvH62SR8OsHYcY9lPGDneNLbOWijs5GGempwmXnEUL8="
        SUFeedURL: "https://caloura.app/appcast.xml"

  CalouraTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CalouraTests
    dependencies:
      - target: Caloura
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caloura.app.tests
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: NG4ML6Q47T
        CODE_SIGN_STYLE: Automatic
