# Keep linting scoped to repo sources (avoid SwiftPM checkouts).
included:
  - Caloura
  - CalouraTests
  - CalouraSystemTests
  - CalouraUITests
  - Package.swift

excluded:
  - .build
  - build
  - DerivedData
  - Caloura.xcodeproj

# Re-enabled with thresholds that accommodate current codebase.
# Warnings flag code for future cleanup; errors block CI.
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - i
    - r
    - g
    - b
    - nc
    - to

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: true

# Size rules: warning == previous error level, so --strict gates on the level
# that actually blocked CI before. Ratchet these down as files are split.
type_body_length:
  warning: 500
  error: 500

function_body_length:
  warning: 120
  error: 120

file_length:
  warning: 1000
  error: 1000

cyclomatic_complexity:
  warning: 20
  error: 20
